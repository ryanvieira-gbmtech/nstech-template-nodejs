pre-commit:
  commands:
    "lint and format":
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,yml}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off --unsafe {staged_files}
      stage_fixed: true

    "run tests":
      run: npm run test -- --findRelatedTests {staged_files}
      glob: "*.{js,ts}"
