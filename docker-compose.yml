services:
  postgres:
    image: postgres:18
    container_name: gbm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gbm_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gbm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gbm_app"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gbm-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gbm_app
      - JWT_SECRET=secret
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gbm-network
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gbm-network:
    driver: bridge
